# =====================================================================
# Generation-2 coordinator — GATE L2 (recurring hourly schedule).
#
# LAUNCH STATE: activated + scheduled. This file runs exactly ONE eligible
# Generation-2 experiment (currently gen2-20260724T044436Z-01a99bd6) on a
# recurring hourly cron. The L1 canary passed every validation, so Gate L2 adds
# one `schedule` (off-peak minute 17, NOT minute 0) alongside `workflow_dispatch`.
# `workflow_dispatch` is retained ONLY for controlled recovery (e.g. redeploy /
# catch-up) — the schedule, not a human, is the normal trigger. There is still NO
# `repository_dispatch`.
#
# Gate history: L1 was manual-only (`workflow_dispatch`, no schedule); the hourly
# cron below is the Gate-L2 change, added only after the L1 canary verified.
#
# Activation-safety guarantees (proved by construction + by the coordinator):
#   * ONE coordinator per experiment. `resolve-experiment` reads every committed
#     manifest, DISCARDS terminal (FAILED_CANARY/CLOSED) and permanently-retired
#     experiments, and requires EXACTLY ONE eligible experiment to remain — it
#     FAILS closed on zero or >1, and can never select the retired canary. Its id
#     keys the tick job's concurrency group, so two runs of the same experiment
#     never execute concurrently.
#   * `verify-current` re-verifies CURRENT + every artifact hash BEFORE computing;
#     the coordinator re-verifies on load; a corrupt pointer fails closed.
#   * A stale/slow run cannot publish over a newer one: monotonic CURRENT +
#     on-disk lock + rebase-then-REVALIDATE. A rebase conflict fails closed. There
#     is NO force push anywhere.
#   * The tick writes ONLY state/gen2/<id>/. A guard aborts if anything outside is
#     dirtied, so a Generation-1 file (state/*_sim.json) can never be touched.
#   * A live tick refuses unless the experiment is ACTIVE and the runner passes
#     --i-understand-this-goes-live.
#   * --allow-fresh is DELIBERATELY ABSENT here. It existed only on the L1 genesis
#     tick so the first-ever run could initialise from $10k with no prior
#     checkpoint. This recurring Gate-L2 workflow OMITS it: if CURRENT is ever lost,
#     the scheduler fails closed rather than silently re-initialising a fresh $10k
#     run. Genesis is done; there is nothing left to bootstrap.
# =====================================================================
name: gen2-coordinator

on:
  # Gate L2: recurring hourly tick at an off-peak minute (NOT :00, to avoid the
  # top-of-hour scheduler congestion GitHub warns about; delivery may still lag).
  # Exactly ONE schedule entry — the coordinator advances at most one shared
  # candle per invocation and never batch-processes missed hours.
  schedule:
    - cron: "17 * * * *"
  # Retained for controlled recovery only (redeploy / operator catch-up). Not the
  # normal trigger and not used to enable the schedule.
  workflow_dispatch: {}

# Least privilege by default: most of the workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Resolve THE single eligible experiment from committed state (authoritative,
  # non-spoofable). Terminal and permanently-retired experiments are discarded so
  # the retired canary can coexist with a fresh experiment yet never be ticked.
  # -------------------------------------------------------------------
  resolve-experiment:
    runs-on: ubuntu-latest
    outputs:
      experiment_id: ${{ steps.resolve.outputs.experiment_id }}
      status: ${{ steps.resolve.outputs.status }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve the single eligible Generation-2 experiment id + status
        id: resolve
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import glob, json, os, sys
          # Mirror algotrading/gen2/experiment.py. Kept inline so this safety-
          # critical resolver has ZERO import dependencies (no pip install needed).
          TERMINAL = {"FAILED_CANARY", "CLOSED"}
          RETIRED = {"gen2-20260724T023914Z-b91b8e74"}
          paths = sorted(glob.glob(os.path.join("state", "gen2", "*", "manifest.json")))
          eligible = []
          for p in paths:
              with open(p, "r", encoding="utf-8") as fh:
                  m = json.load(fh)
              exp_id, status = m.get("experiment_id"), m.get("status")
              if exp_id in RETIRED or status in TERMINAL:
                  sys.stderr.write(
                      f"skip ineligible experiment {exp_id!r} (status={status!r})\n")
                  continue
              eligible.append((exp_id, status))
          if len(eligible) != 1:
              sys.stderr.write(
                  f"Expected exactly ONE eligible Generation-2 experiment, found "
                  f"{len(eligible)}: {eligible}. Refusing to tick.\n")
              sys.exit(1)
          exp_id, status = eligible[0]
          if exp_id in RETIRED:                      # defence in depth
              sys.stderr.write(f"Refusing retired experiment {exp_id!r}.\n")
              sys.exit(1)
          print(f"experiment_id={exp_id}")
          print(f"status={status}")
          PY

  # -------------------------------------------------------------------
  # Run exactly one coordinator tick. Concurrency is keyed by the resolved
  # experiment id so overlapping runs of the same experiment serialise.
  # -------------------------------------------------------------------
  tick:
    needs: resolve-experiment
    # Only tick an experiment a human has explicitly ACTIVATED.
    if: needs.resolve-experiment.outputs.status == 'ACTIVE'
    runs-on: ubuntu-latest
    # This is the only job that writes to the repo.
    permissions:
      contents: write
    concurrency:
      group: gen2-coordinator-${{ needs.resolve-experiment.outputs.experiment_id }}
      cancel-in-progress: false
    env:
      EXPERIMENT_ID: ${{ needs.resolve-experiment.outputs.experiment_id }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the rebase before push has a merge base

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify CURRENT before computing (fail closed on any hash mismatch)
        # On the genesis tick CURRENT is absent -> "nothing to verify" (exit 0).
        # On any later tick this re-verifies the published pointer + all hashes.
        run: |
          python -m algotrading.gen2 --experiment-id "$EXPERIMENT_ID" verify-current

      - name: Run ONE Generation-2 coordinator tick (all 8 bots, simulated, public prices)
        # A single process fetches BTC+ETH closed candles once, freezes one shared
        # hashed market snapshot, runs all 8 bots against it, and publishes
        # atomically. Requires an ACTIVE experiment; refuses otherwise. No `|| true`:
        # a required-bot failure aborts the whole tick with zero publication.
        # NOTE: --allow-fresh is intentionally NOT passed. Genesis is complete, so a
        # scheduled tick with a missing CURRENT must fail closed, not re-initialise.
        run: |
          python -m algotrading.gen2 --config config/config.ci.yaml \
            --experiment-id "$EXPERIMENT_ID" tick --i-understand-this-goes-live

      - name: Persist Generation-2 state back to the repo (scoped, rebase-revalidated, no force)
        run: |
          set -euo pipefail
          git config user.name "gen2-coordinator-bot"
          git config user.email "gen2-coordinator-bot@users.noreply.github.com"

          EXP_PATH="state/gen2/${EXPERIMENT_ID}"

          # Guard: a tick must ONLY write inside its own experiment directory.
          # awk (exit 0 on no match) prints any dirty path NOT under EXP_PATH, so we
          # avoid `|| true` and still fail closed on anything outside it.
          OUTSIDE="$(git status --porcelain | awk -v p=" ${EXP_PATH}/" 'index($0, p) == 0')"
          if [ -n "$OUTSIDE" ]; then
            echo "::error::Tick dirtied paths outside ${EXP_PATH}:"
            echo "$OUTSIDE"
            exit 1
          fi

          # Stage ONLY this experiment's directory.
          git add "$EXP_PATH"
          if git diff --staged --quiet; then
            echo "No Generation-2 state change to commit."
            exit 0
          fi
          git commit -m "gen2: coordinator tick [skip ci]"

          # Publish with rebase-then-REVALIDATE. A push race is retried; a rebase
          # CONFLICT means a newer run already advanced this experiment, so fail
          # closed rather than clobber (never --force).
          pushed=""
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Rebase conflict incorporating origin/main — a newer run "
              echo "::error::published for this experiment. Failing closed (no clobber)."
              exit 1
            fi
            # Revalidate CURRENT after incorporating the remote: the pushed tree must
            # still resolve to a fully hash-consistent checkpoint.
            if ! python -m algotrading.gen2 --experiment-id "$EXPERIMENT_ID" verify-current; then
              echo "::error::CURRENT failed verification after rebase; refusing to push."
              exit 1
            fi
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "push attempt $attempt rejected (remote advanced); retrying..."
            sleep 5
          done
          if [ -z "$pushed" ]; then
            echo "::error::Failed to persist Generation-2 state after 5 attempts."
            exit 1
          fi

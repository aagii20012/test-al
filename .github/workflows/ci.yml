# =====================================================================
# CI — offline test suite only.
#
# This workflow exists solely to give pushed commits a verifiable green-build
# provenance (it runs `pytest` in a clean Ubuntu + Python 3.11 environment). It is
# deliberately inert with respect to trading:
#
#   * Triggers ONLY on push and pull_request. No schedule, no repository_dispatch,
#     no workflow_dispatch — it can never be poked to run a trading tick.
#   * It runs the test suite and nothing else. It does NOT invoke the Generation-1
#     or Generation-2 coordinators, does NOT fetch live market data (the whole
#     suite is offline: every fetch/HTTP call in tests is an injected fake), and
#     places no orders.
#   * `permissions: contents: read` — it cannot write to the repo. It makes no
#     commits, no pushes, and no state updates. It reads no secrets.
#
# Renaming or enabling the Generation-2 coordinator is a separate, human-gated
# launch step and is unaffected by this file.
# =====================================================================
name: ci

on:
  push:
  pull_request:

# Least privilege: the test job only needs to read the checked-out code.
permissions:
  contents: read

# Supersede an in-flight run for the same ref when a newer commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the offline test suite (no market data, no coordinator, no trading)
        run: python -m pytest -q

      - name: Prove LF/CRLF source-hash portability on Linux (evidence in log)
        # The full suite above already covers this; re-running the portability
        # tests verbosely puts their names + PASS status directly in the CI log as
        # named evidence that LF, CRLF, mixed and lone-CR trees hash identically on
        # a genuine Ubuntu runner (the authoritative environment).
        run: |
          python -m pytest tests/test_gen2_source_hash.py -v \
            -k "lf or crlf or windows or linux or newline or deterministic"

      - name: Record the Gen2 canonical source hash (Linux authoritative value)
        # Prints the canonical v2 hash of the ACTUAL checked-out tree so the Linux
        # value is captured in the CI log. This is the value the local Windows
        # checkout MUST reproduce byte-for-byte; a mismatch means the portability
        # remediation regressed (SOURCE_BINDING_REMEDIATION_FAILED).
        run: |
          python - <<'PY'
          from algotrading.gen2 import source_hash as sh
          h = sh.canonical_source_hash()
          print("GEN2_CANONICAL_SOURCE_HASH")
          for k in ("algorithm", "version", "sha256", "file_count", "inventory_sha256"):
              print(f"  {k}={h[k]}")
          PY

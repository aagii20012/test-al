# =====================================================================
# Generation-2 public dashboard — GitHub Pages (READ-ONLY renderer).
#
# This workflow is the ONLY thing that deploys the public scoreboard, and it is
# deliberately, provably NOT a trading path:
#
#   * It runs `python -m algotrading.gen2 build-pages`, which reads ONLY the
#     committed manifest + the verified CURRENT checkpoint and writes a static
#     HTML file. It fetches NO market data, places NO orders, and never calls the
#     coordinator's tick path. (The dashboard module imports no live-fetch code
#     for rendering.)
#   * It has NO `contents: write`. It cannot commit, push, or mutate state. The
#     only things it can write are the Pages artifact + deployment.
#   * Trading (the coordinator) and publishing (this workflow) are separate
#     workflows on purpose: a dashboard build can never advance a bot, and a
#     coordinator tick never needs Pages permissions.
#
# Fail-closed: if `build-pages` cannot verify CURRENT for the selected experiment
# it exits non-zero, the build job fails, the deploy job (which `needs` it) is
# skipped, and the last successfully-deployed site stays live. A corrupt store is
# therefore never published over a good one.
#
# ONE-TIME REPO SETUP (manual, in GitHub repo Settings): Settings -> Pages ->
# "Build and deployment" -> Source = "GitHub Actions". No branch is served
# directly; this workflow is the source. See docs/gen2-reproducibility.md.
# =====================================================================
name: gen2-pages

on:
  # Gate L2 PRIMARY TRIGGER: auto-deploy after the coordinator finishes.
  # `workflow_run` is NOT suppressed by "[skip ci]" (that only affects the
  # push/pull_request events of the *committing* run), so a scheduled tick — whose
  # checkpoint commit carries "[skip ci]" — still fires exactly one dashboard
  # deploy here. The build job below runs ONLY when that coordinator run concluded
  # `success` on `main`; a failed/cancelled coordinator deploys nothing and the
  # last known-good site stays live.
  workflow_run:
    workflows: ["gen2-coordinator"]
    types: [completed]
  # Manual deploy/redeploy — recovery runbook's "redeploy last-good dashboard".
  workflow_dispatch: {}
  # Belt-and-braces auto-refresh when the committed dashboard renderer (or state)
  # changes via a NON-tick commit (e.g. this Gate-L2 change updates the banner
  # text). Tick commits carry "[skip ci]" and do NOT fire this push trigger, so
  # the primary `workflow_run` path above is the sole deployer after a tick — no
  # duplicate. The shared `concurrency` group serialises any overlap regardless.
  push:
    branches: [main]
    paths:
      - "state/gen2/**"
      - "algotrading/gen2/dashboard.py"
      - "algotrading/gen2/__main__.py"
      - ".github/workflows/gen2-pages.yml"

# Least privilege for the official GitHub Pages deployment method.
#   contents: read   -> check out the repo (no write; cannot mutate state)
#   pages: write     -> REQUIRED by actions/deploy-pages to publish the site
#   id-token: write  -> REQUIRED by actions/deploy-pages for its OIDC handshake
# (Message B §3: id-token is used ONLY because the official Pages deploy action
# requires it; no other elevated scope is granted.)
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time; queued runs collapse to the latest, but an
# in-flight production deploy is allowed to finish (never cancelled).
concurrency:
  group: gen2-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Deploy ONLY on a healthy trigger:
    #   * workflow_run  -> the coordinator concluded `success` on `main`. A
    #     failed/cancelled/other-branch coordinator run deploys nothing.
    #   * push / workflow_dispatch -> always allowed (already scoped to main/paths
    #     or an explicit human recovery action).
    if: >-
      ${{ github.event_name != 'workflow_run' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    steps:
      - name: Check out the LATEST verified origin/main (not workflow_run.head_sha)
        # The coordinator creates its checkpoint commit DURING the run, so the
        # triggering run's head SHA predates the state we must publish. We check out
        # the current tip of main (fetch-depth: 0 so the descendant check below has
        # full history) and then prove it descends from that run.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify latest main descends from the triggering coordinator run
        # Fail closed if the checked-out tip is not a descendant of (or equal to)
        # the coordinator run's head SHA — i.e. history diverged or the run does not
        # belong to this line. Only meaningful for the workflow_run trigger.
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          TIP="$(git rev-parse HEAD)"
          echo "Triggering coordinator run head SHA: ${HEAD_SHA}"
          echo "Checked-out main tip:                ${TIP}"
          if ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            echo "::error::Triggering head SHA ${HEAD_SHA} is absent from main history;"
            echo "::error::refusing to publish state not descended from that run."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${HEAD_SHA}" "${TIP}"; then
            echo "::error::main tip ${TIP} is NOT a descendant of coordinator head"
            echo "::error::${HEAD_SHA}. History diverged; failing closed (keep last-good)."
            exit 1
          fi
          echo "OK: main tip descends from (or equals) the coordinator run head."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the static dashboard from committed state (read-only)
        # RESOLVE + HASH-VERIFY BEFORE BUILD: build-pages resolves the single
        # deployable experiment, then build_scoreboard re-verifies the CURRENT
        # pointer, its checkpoint-manifest hash AND every artifact hash BEFORE any
        # HTML is written. On any integrity defect it raises, no index.html is
        # produced, the `test -f` below also fails, this job fails, the deploy job
        # (which `needs` it) is skipped, and the last known-good published site
        # stays live. An orphan/partial/unverified checkpoint is therefore never
        # displayed. (Only a retired/terminal-only store renders an honest
        # placeholder rather than fake numbers.)
        run: |
          python -m algotrading.gen2 build-pages --out site
          test -f site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the static site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
